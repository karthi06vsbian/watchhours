services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_PATH: /app/server/data/monitor.db
    ports:
      - "4000:4000"
    volumes:
      - monitor-data:/app/server/data

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:4000
    depends_on:
      - server
    ports:
      - "5173:80"

volumes:
  monitor-data:
